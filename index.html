<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Semantic HTML5 Page</title>
</head>
<body>

  <!-- Header with site branding -->
  <header>
    <h1>My Website</h1>
    <p>Welcome to my semantic HTML5 example</p>
  </header>

  <!-- Navigation bar -->
  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Main content area -->
  <main>
    <!-- Section: About -->
    <section id="about">
      <h2>About Us</h2>
      <p>This section describes the purpose of 
        the website and provides background 
        information.</p>
    </section>

    <section id="gallery">
      <h2>Gallery</h2>
      <figure>
        <img src="2mdvG6m.jpg" alt="Beautiful landscape" width="80" height="10">
        <figcaption> view mountains </figcaption>
      </figure>
      <figure>
        <img src="392542.jpg" alt="City skyline" width="80" height="10">
        <figcaption>The city skyline captured at dusk.</figcaption>
      </figure>
    </section>

    <!-- Section: Contact -->
    <section id="contact">
      <h2>Contact</h2>
      <p>You can reach us via 
        email at <a href="mailto:info@example.com">info@example.com</a>.</p>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
